<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Geométrico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Conexão Criptografada</h1>
        
       <div id="telaAcesso" class="tela-acesso">
            <p>Identifique-se e escolha uma sala secreta:</p>
            <input type="text" id="inputNome" placeholder="Seu nome ou apelido">
            <input type="text" id="inputSala" placeholder="Nome da sala (Ex: projeto-x)">
            <button id="btnEntrar">Entrar na Sala</button>
        </div>

        <div id="telaChat" style="display: none;">
            <p id="infoSala" style="text-align: center; color: #666; margin-bottom: 10px;"></p>
            
            <div id="chatBox" class="chat-box"></div>
            
            <div class="controles">
                <input type="text" id="inputText" placeholder="Digite sua mensagem...">
                <button id="btnEnviar">Enviar</button>
                <button id="btnTraduzir">Traduzir Tudo</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
